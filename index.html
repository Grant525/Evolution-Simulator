<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Evolution Simulator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; color: #eee; font-family: monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    #stats-bar { background: #1a1a1a; border-bottom: 1px solid #333; padding: 6px 12px; display: flex; flex-wrap: wrap; gap: 16px; font-size: 11px; flex-shrink: 0; }
    .stat-item { color: #aaa; }
    .stat-item span { color: #7df; font-weight: bold; }

    #main { display: flex; flex: 1; overflow: hidden; }
    #map-panel { flex: 1; display: flex; flex-direction: column; }
    #controls { padding: 8px 12px; background: #1a1a1a; display: flex; gap: 12px; align-items: center; border-bottom: 1px solid #333; flex-shrink: 0; }
    #controls button { background: #2a2a2a; color: #eee; border: 1px solid #444; padding: 4px 12px; cursor: pointer; }
    #controls button:hover { background: #3a3a3a; }
    #controls select { background: #2a2a2a; color: #eee; border: 1px solid #444; padding: 4px; }
    #map-3d { flex: 1; }

    #sidebar { width: 280px; background: #1a1a1a; border-left: 1px solid #333; overflow-y: auto; padding: 12px; flex-shrink: 0; }
    #sidebar h2 { font-size: 13px; color: #aaa; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    #sidebar h3 { font-size: 12px; color: #888; margin: 10px 0 4px; }
    .env-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 10px; }
    .env-row { font-size: 11px; }
    .env-row span { color: #7af; }

    .plant-card { background: #222; border: 1px solid #333; padding: 8px; margin-bottom: 8px; }
    .plant-card .plant-title { font-size: 11px; color: #8f8; margin-bottom: 6px; }
    .trait-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 8px; }
    .trait { font-size: 10px; }
    .trait span { color: #fa8; }

    .bar-wrap { margin: 2px 0; }
    .bar-label { font-size: 10px; display: flex; justify-content: space-between; }
    .bar { height: 4px; background: #333; border-radius: 2px; }
    .bar-fill { height: 4px; border-radius: 2px; background: #4a4; }

    #no-selection { color: #555; font-size: 12px; margin-top: 20px; }
    #lineage-panel { position: fixed; top: 80px; right: 300px; width: 260px; background: #1a1a1a; border: 1px solid #444; padding: 12px; display: none; z-index: 10; overflow-y: auto; max-height: 80vh; }
    #lineage-panel h2 { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: flex; justify-content: space-between; }
    .lineage-entry { font-size: 10px; padding: 4px 6px; margin: 2px 0; background: #222; border-left: 2px solid #444; cursor: pointer; }
    .lineage-entry:hover { background: #2a2a2a; }
    .lineage-entry.current { border-left-color: #7df; }
    .lineage-entry.ancestor { border-left-color: #a74; }
    .lineage-entry.child { border-left-color: #4a7; }
  </style>
</head>
<body>

<div id="stats-bar">
  <div class="stat-item">Plants: <span id="s-total">—</span></div>
  <div class="stat-item">Avg Health: <span id="s-health">—</span></div>
  <div class="stat-item">Avg Age: <span id="s-age">—</span></div>
  <div class="stat-item">Avg Energy: <span id="s-energy">—</span></div>
  <div class="stat-item">Avg Root Depth: <span id="s-root">—</span></div>
  <div class="stat-item">Avg Leaf Size: <span id="s-leaf">—</span></div>
  <div class="stat-item">Avg Height: <span id="s-height">—</span></div>
  <div class="stat-item">Avg Water Need: <span id="s-water">—</span></div>
  <div class="stat-item">Avg Sun Need: <span id="s-sun">—</span></div>
  <div class="stat-item">Avg Lifespan: <span id="s-lifespan">—</span></div>
  <div class="stat-item">Avg Growth Speed: <span id="s-growth">—</span></div>
  <div class="stat-item">Avg Temp Resilience: <span id="s-tempres">—</span></div>
</div>

<div id="main">
  <div id="map-panel">
    <div id="controls">
      <button id="btn-tick">Tick</button>
      <button id="btn-play">Play</button>
      <button id="btn-pause" disabled>Pause</button>
      <button id="btn-restart" style="color:#f88">Restart</button>
      <label style="font-size:12px">View:
        <select id="view-mode">
          <option value="plant_count">Plant Count</option>
          <option value="elevation">Elevation</option>
          <option value="sunlight">Sunlight</option>
          <option value="rainfall">Rainfall</option>
          <option value="groundwater">Groundwater</option>
          <option value="soil_quality">Soil Quality</option>
          <option value="humidity">Humidity</option>
          <option value="temperature">Temperature</option>
          <option value="avg_health">Avg Plant Health</option>
          <option value="avg_root_depth">Avg Root Depth</option>
          <option value="avg_height">Avg Height</option>
        </select>
      </label>
      <label style="font-size:12px">Speed:
        <select id="speed-mode">
          <option value="1,500">1x</option>
          <option value="1,200">2x</option>
          <option value="1,100">5x</option>
          <option value="10,200">10x</option>
          <option value="50,200">50x</option>
          <option value="100,200">100x</option>
        </select>
      </label>
      <span id="tick-count" style="font-size:12px;color:#888">Tick: 0</span>
    </div>
    <div id="map-3d"></div>
  </div>

  <div id="lineage-panel">
    <h2>Lineage <span style="cursor:pointer;color:#666" onclick="document.getElementById('lineage-panel').style.display='none'">✕</span></h2>
    <div id="lineage-content"></div>
  </div>

  <div id="sidebar">
    <h2>Tile Detail</h2>
    <div id="tile-detail"><div id="no-selection">Click a tile to inspect it.</div></div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// -----------------------------------------------------------------------
// Scene setup
// -----------------------------------------------------------------------
const HEX_R        = 1.0;   // hex radius (world units)
const HEIGHT_SCALE = 12.0;  // elevation 0-1 maps to 0-12 units tall
const MIN_HEIGHT   = 0.15;  // minimum prism height

const container = document.getElementById('map-3d');

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);
scene.fog = new THREE.Fog(0x0a0a0f, 40, 90);

const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 200);
camera.position.set(12, 18, 22);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.screenSpacePanning = true;   // pan in screen plane (more natural)
controls.mouseButtons = {
  LEFT:   THREE.MOUSE.ROTATE,
  MIDDLE: THREE.MOUSE.DOLLY,
  RIGHT:  THREE.MOUSE.PAN,
};

// Lighting
const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xfff5e0, 1.2);
sun.position.set(15, 30, 20);
sun.castShadow = true;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x8899cc, 0.3);
fill.position.set(-10, 10, -10);
scene.add(fill);

// -----------------------------------------------------------------------
// Resize
// -----------------------------------------------------------------------
function resize() {
  const w = container.clientWidth;
  const h = container.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

// -----------------------------------------------------------------------
// Hex grid geometry
// -----------------------------------------------------------------------
function hexCenter3D(col, row) {
  const w = Math.sqrt(3) * HEX_R;
  const x = col * w + (row % 2) * (w / 2);
  const z = row * HEX_R * 1.5;
  return [x, z];
}

// Shared hex cross-section geometry (height=1, scaled per tile)
const hexGeo = new THREE.CylinderGeometry(HEX_R * 0.96, HEX_R * 0.96, 1, 6);
hexGeo.rotateY(Math.PI / 6);

let tileMeshes = [];   // flat array of meshes
let worldData  = null;

function tileColorHex(tile, mode) {
  if (tile.is_water) return 0x1a3a6a;
  const v = Math.min(1, Math.max(0, tile[mode] ?? 0));

  if (mode === 'plant_count') {
    const t = Math.min(1, v / 5);
    return new THREE.Color(0.08 + (1-t)*0.2, 0.16 + t*0.7, 0.08).getHex();
  }
  if (mode === 'temperature') {
    return new THREE.Color(v * 0.85, 0.1, (1-v) * 0.85).getHex();
  }
  if (mode === 'elevation') {
    return new THREE.Color(v * 0.7, v * 0.7, v * 0.7).getHex();
  }
  // Generic blue→green gradient
  return new THREE.Color(0.08 + (1-v)*0.15, 0.24 + v*0.6, 0.2 + v*0.4).getHex();
}

function buildGrid(data) {
  // Remove old tile meshes
  for (const m of tileMeshes) scene.remove(m);
  tileMeshes = [];

  const mode = document.getElementById('view-mode').value;

  for (const tile of data.tiles) {
    const h   = Math.max(MIN_HEIGHT, tile.elevation * HEIGHT_SCALE);
    const mat = new THREE.MeshLambertMaterial({ color: tileColorHex(tile, mode) });
    const mesh = new THREE.Mesh(hexGeo, mat);
    mesh.scale.y = h;
    const [x, z] = hexCenter3D(tile.x, tile.y);
    mesh.position.set(x, h / 2, z);
    mesh.castShadow    = true;
    mesh.receiveShadow = true;
    mesh.userData.tile = tile;
    scene.add(mesh);
    tileMeshes.push(mesh);
  }

  // Point camera at grid centre on first load
  if (data.tiles.length) {
    const cx = (data.width  - 1) * Math.sqrt(3) * HEX_R / 2;
    const cz = (data.height - 1) * HEX_R * 1.5  / 2;
    controls.target.set(cx, 0, cz);
    camera.position.set(cx, 18, cz + 22);
    controls.update();
  }
}

function updateColors() {
  if (!worldData) return;
  const mode = document.getElementById('view-mode').value;
  const tiles = worldData.tiles;
  for (let i = 0; i < tileMeshes.length; i++) {
    tileMeshes[i].material.color.setHex(tileColorHex(tiles[i], mode));
  }
}

// -----------------------------------------------------------------------
// Render loop
// -----------------------------------------------------------------------
(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();

// -----------------------------------------------------------------------
// Fetch & tick
// -----------------------------------------------------------------------
async function fetchState() {
  const res = await fetch('/state');
  worldData  = await res.json();
  buildGrid(worldData);
}

async function fetchStats() {
  const res = await fetch('/stats');
  const s   = await res.json();
  document.getElementById('s-total').textContent    = s.total_plants ?? '—';
  document.getElementById('s-health').textContent   = s.avg_health   ?? '—';
  document.getElementById('s-age').textContent      = s.avg_age      ?? '—';
  document.getElementById('s-energy').textContent   = s.avg_energy   ?? '—';
  document.getElementById('s-root').textContent     = s.avg_root_depth ?? '—';
  document.getElementById('s-leaf').textContent     = s.avg_leaf_size  ?? '—';
  document.getElementById('s-height').textContent   = s.avg_height     ?? '—';
  document.getElementById('s-water').textContent    = s.avg_water_need ?? '—';
  document.getElementById('s-sun').textContent      = s.avg_sun_need   ?? '—';
  document.getElementById('s-lifespan').textContent = s.avg_lifespan   ?? '—';
  document.getElementById('s-growth').textContent   = s.avg_growth_speed ?? '—';
  document.getElementById('s-tempres').textContent  = s.avg_temperature_resilience ?? '—';
}

function getSpeed() {
  const [n, ms] = document.getElementById('speed-mode').value.split(',').map(Number);
  return { n, ms };
}

let tickCount    = 0;
let playInterval = null;

async function doTick() {
  const { n } = getSpeed();
  const res  = await fetch(`/ticks/${n}`, { method: 'POST' });
  const data = await res.json();
  tickCount  = data.tick;
  document.getElementById('tick-count').textContent = `Tick: ${tickCount}`;
  await Promise.all([fetchState(), fetchStats()]);
}

// -----------------------------------------------------------------------
// Click — raycast to tile, show sidebar
// -----------------------------------------------------------------------
const raycaster  = new THREE.Raycaster();
const mouse      = new THREE.Vector2();
let   mouseStart = null;

renderer.domElement.addEventListener('mousedown', e => {
  mouseStart = { x: e.clientX, y: e.clientY };
});

renderer.domElement.addEventListener('mouseup', async e => {
  if (!mouseStart) return;
  const dx = e.clientX - mouseStart.x;
  const dy = e.clientY - mouseStart.y;
  if (Math.sqrt(dx*dx + dy*dy) > 5) return;  // was a drag

  const rect = renderer.domElement.getBoundingClientRect();
  mouse.set(
    ((e.clientX - rect.left) / rect.width)  *  2 - 1,
    ((e.clientY - rect.top)  / rect.height) * -2 + 1
  );
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(tileMeshes);
  if (!hits.length) return;

  const tile = hits[0].object.userData.tile;
  const res  = await fetch(`/tile/${tile.x}/${tile.y}`);
  const data = await res.json();
  renderSidebar(data);

  // Highlight selected tile
  tileMeshes.forEach(m => m.material.emissive?.setHex(0x000000));
  hits[0].object.material.emissive = new THREE.Color(0x334433);
});

// -----------------------------------------------------------------------
// Sidebar
// -----------------------------------------------------------------------
function renderSidebar(data) {
  const { x, y, environment: env, plants } = data;
  let html = `<h2>Tile (${x}, ${y})</h2>`;

  html += `<h3>Environment</h3><div class="env-grid">`;
  for (const [k, v] of Object.entries(env))
    html += `<div class="env-row">${k}: <span>${v}</span></div>`;
  html += `</div>`;

  html += `<h3>Plants (${plants.length})</h3>`;
  if (!plants.length)
    html += `<div style="color:#555;font-size:11px">No plants on this tile.</div>`;

  for (let i = 0; i < plants.length; i++) {
    const p = plants[i];
    html += `<div class="plant-card">`;
    html += `<div class="plant-title">Plant ${i+1} (ID: ${p.plant_id}) — age ${p.age} — energy ${p.energy}`;
    if (p.plant_id !== null)
      html += ` <button onclick="showLineage(${p.plant_id})" style="font-size:9px;padding:1px 5px;margin-left:4px">Lineage</button>`;
    html += `</div>`;
    html += `<div class="bar-wrap"><div class="bar-label"><span>health</span><span>${p.health}</span></div>`;
    html += `<div class="bar"><div class="bar-fill" style="width:${p.health*100}%;background:#4f4"></div></div></div>`;
    html += `<div class="trait-grid">`;
    for (const [k, v] of Object.entries(p)) {
      if (['health','age','energy'].includes(k)) continue;
      html += `<div class="trait">${k}: <span>${v}</span></div>`;
    }
    html += `</div></div>`;
  }
  document.getElementById('tile-detail').innerHTML = html;
}

// -----------------------------------------------------------------------
// Lineage (called from sidebar button — needs global scope)
// -----------------------------------------------------------------------
window.showLineage = async function(plantId) {
  const res = await fetch(`/lineage/${plantId}`);
  if (!res.ok) return;
  const data = await res.json();

  function entryHTML(p, cls, label) {
    const status = p.died_tick ? `died tick ${p.died_tick}` : 'alive';
    return `<div class="lineage-entry ${cls}" onclick="showLineage(${p.id})">
      <strong>${label} — ID ${p.id}</strong><br>
      Born tick ${p.born_tick} · ${status}<br>
      Tile (${p.birth_tile[0]}, ${p.birth_tile[1]})
    </div>`;
  }

  let html = '';
  if (data.ancestors.length) {
    html += `<div style="color:#888;font-size:10px;margin:4px 0">Ancestors (oldest first)</div>`;
    data.ancestors.forEach((a, i) =>
      html += entryHTML(a, 'ancestor', `Gen -${data.ancestors.length - i}`));
  }
  html += entryHTML(data.plant, 'current', 'This plant');
  if (data.children.length) {
    html += `<div style="color:#888;font-size:10px;margin:4px 0">Children</div>`;
    data.children.forEach(c => html += entryHTML(c, 'child', 'Child'));
  } else {
    html += `<div style="color:#555;font-size:10px;margin-top:4px">No children yet.</div>`;
  }

  document.getElementById('lineage-content').innerHTML = html;
  document.getElementById('lineage-panel').style.display = 'block';
};

// -----------------------------------------------------------------------
// Controls
// -----------------------------------------------------------------------
document.getElementById('btn-tick').addEventListener('click', doTick);

function startPlay() {
  if (playInterval) clearInterval(playInterval);
  const { ms } = getSpeed();
  playInterval = setInterval(doTick, ms);
  document.getElementById('btn-play').disabled  = true;
  document.getElementById('btn-pause').disabled = false;
}
document.getElementById('btn-play').addEventListener('click', startPlay);
document.getElementById('speed-mode').addEventListener('change', () => {
  if (playInterval) startPlay();
});
document.getElementById('btn-pause').addEventListener('click', () => {
  clearInterval(playInterval);
  playInterval = null;
  document.getElementById('btn-play').disabled  = false;
  document.getElementById('btn-pause').disabled = true;
});
document.getElementById('view-mode').addEventListener('change', updateColors);
document.getElementById('btn-restart').addEventListener('click', async () => {
  if (playInterval) {
    clearInterval(playInterval);
    playInterval = null;
    document.getElementById('btn-play').disabled  = false;
    document.getElementById('btn-pause').disabled = true;
  }
  await fetch('/restart', { method: 'POST' });
  tickCount = 0;
  document.getElementById('tick-count').textContent = 'Tick: 0';
  document.getElementById('tile-detail').innerHTML  = '<div id="no-selection">Click a tile to inspect it.</div>';
  document.getElementById('lineage-panel').style.display = 'none';
  await Promise.all([fetchState(), fetchStats()]);
});

// -----------------------------------------------------------------------
// Init
// -----------------------------------------------------------------------
fetchState();
fetchStats();

let serverWasDown = false;
setInterval(async () => {
  try {
    await fetch('/state');
    if (serverWasDown) { serverWasDown = false; location.reload(); }
  } catch { serverWasDown = true; }
}, 1500);

</script>
</body>
</html>
